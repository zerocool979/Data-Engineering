<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/loading.css') }}">
</head>
<body>
    <div class="loading-container">
        <div class="loading-card">
            <div class="spinner">
                <div class="double-bounce1"></div>
                <div class="double-bounce2"></div>
            </div>
            
            <h2>Processing Scraping...</h2>
            
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            
            <div class="status-message" id="statusMessage">
                <p>Analyzing URLs: <span id="urlDisplay">{{ url }}</span></p>
                <p id="currentAction">Starting scraping process...</p>
            </div>
            
            <div class="loading-details">
                <div class="detail-item">
                    <span class="detail-label">Status:</span>
                    <span class="detail-value" id="statusValue">Preparing connection</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Progress:</span>
                    <span class="detail-value" id="progressValue">0%</span>
                </div>
            </div>

            <div class="tips">
                <p>💡 Tip: The scraping process depends on the size and complexity of the website.</p>
            </div>
        </div>
    </div>

    <script>
        // Data URL untuk hasil scraping
        const targetUrl = "{{ url }}";
    </script>
    <script src="{{ url_for('static', filename='js/loading.js') }}"></script>
</body>
</html>
